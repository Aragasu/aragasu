<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FolderMap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface2: #18181d;
    --border: #242430;
    --border2: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --dim: #4a4a62;
    --text: #e8e8f0;
    --text2: #9090b0;
    --red: #f77;
    --green: #7fdb8a;
    --yellow: #f7c948;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header h1 span { color: var(--accent2); }

  .badge {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--border2);
    color: var(--text2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    height: calc(100vh - 61px);
  }

  /* LEFT PANEL */
  .editor-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .toolbar {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--border2); border-color: var(--accent); color: var(--accent2); }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  .btn.danger:hover { border-color: var(--red); color: var(--red); }

  .btn svg { width: 14px; height: 14px; }

  .tree-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }

  .tree-container::-webkit-scrollbar { width: 6px; }
  .tree-container::-webkit-scrollbar-track { background: transparent; }
  .tree-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* TREE NODES */
  .node {
    position: relative;
    user-select: none;
  }

  .node-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 16px 4px 0;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.1s;
    position: relative;
  }

  .node-row:hover { background: var(--surface2); }
  .node-row.selected { background: rgba(124, 106, 247, 0.1); }

  .node-indent {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .node-toggle {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 10px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .node-toggle.open { transform: rotate(90deg); }
  .node-toggle.leaf { opacity: 0; pointer-events: none; }

  .node-icon {
    font-size: 14px;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }

  .node-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }

  .node-name.folder { color: var(--yellow); }
  .node-name.file { color: var(--text); }

  .node-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-left: 4px;
  }

  .node-actions {
    display: none;
    gap: 3px;
    margin-right: 8px;
  }

  .node-row:hover .node-actions { display: flex; }

  .node-action-btn {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.1s;
  }

  .node-action-btn:hover { background: var(--border2); color: var(--text); border-color: var(--border2); }
  .node-action-btn.del:hover { color: var(--red); }
  .node-action-btn svg { width: 11px; height: 11px; }

  .node-children {
    overflow: hidden;
  }

  /* INLINE EDIT */
  .inline-input {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 2px 6px;
    outline: none;
    width: 140px;
  }

  .inline-input.desc {
    width: 200px;
    border-color: var(--border2);
    color: var(--dim);
    font-size: 11px;
  }

  /* ADD ROW */
  .add-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 16px 4px 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .add-row.visible { opacity: 1; pointer-events: all; }

  /* RIGHT PANEL */
  .output-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    background: var(--bg);
  }

  .output-body::-webkit-scrollbar { width: 6px; }
  .output-body::-webkit-scrollbar-track { background: transparent; }
  .output-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre;
    tab-size: 2;
  }

  pre .folder-name { color: var(--yellow); }
  pre .connector { color: var(--dim); }
  pre .file-name { color: var(--text); }
  pre .comment { color: var(--dim); }

  .output-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .stat { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 24px;
    width: 380px;
    transform: translateY(10px);
    transition: transform 0.15s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* EMPTY STATE */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--dim);
  }

  .empty svg { width: 40px; height: 40px; opacity: 0.3; }
  .empty p { font-size: 13px; }

  /* IMPORT FILE */
  #fileInput { display: none; }

  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
  }

  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>Folder<span>Map</span></h1>
  <span class="badge">v1.0</span>
</header>

<div class="main">
  <!-- LEFT: EDITOR -->
  <div class="editor-panel">
    <div class="panel-header">
      <span class="panel-title">Struktur</span>
      <button class="btn danger" onclick="clearAll()" title="Alles löschen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
    <div class="toolbar">
      <button class="btn primary" onclick="addRootFolder()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        Ordner
      </button>
      <button class="btn" onclick="addRootFile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="13" x2="12" y2="17"/><line x1="10" y1="15" x2="14" y2="15"/></svg>
        Datei
      </button>
      <button class="btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import
      </button>
      <input type="file" id="fileInput" accept=".txt,.text" onchange="importFile(event)">
    </div>
    <div class="tree-container" id="tree"></div>
  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="output-panel">
    <div class="panel-header">
      <span class="panel-title">Output</span>
      <button class="btn" onclick="copyOutput()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Kopieren
      </button>
    </div>
    <div class="output-body">
      <pre id="output"></pre>
    </div>
    <div class="output-footer">
      <span class="stat" id="stat">0 Einträge</span>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Neuer Ordner</h2>
    <p id="modal-subtitle">Name eingeben</p>
    <input class="modal-input" id="modal-name" placeholder="z.B. components" autocomplete="off" />
    <input class="modal-input" id="modal-desc" placeholder="Beschreibung (optional)" autocomplete="off" />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" id="modal-confirm" onclick="confirmModal()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="copy-toast" id="toast">✓ Kopiert!</div>

<script>
// ── DATA MODEL ──────────────────────────────────────────────
let nodes = []; // root level nodes
let nodeId = 0;

function createNode(type, name, desc = '') {
  return { id: nodeId++, type, name, desc, children: [], open: true };
}

// ── MODAL ────────────────────────────────────────────────────
let modalCb = null;

function openModal(title, subtitle, type, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-subtitle').textContent = subtitle;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-desc').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
  modalCb = cb;

  document.getElementById('modal-name').onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('modal-desc').focus(); }
  };
  document.getElementById('modal-desc').onkeydown = (e) => {
    if (e.key === 'Enter') confirmModal();
    if (e.key === 'Escape') closeModal();
  };
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalCb = null;
}

function confirmModal() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) return;
  const desc = document.getElementById('modal-desc').value.trim();
  closeModal();
  modalCb && modalCb(name, desc);
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ── NODE OPERATIONS ──────────────────────────────────────────
function findNode(id, arr) {
  for (const n of arr) {
    if (n.id === id) return n;
    if (n.children.length) { const f = findNode(id, n.children); if (f) return f; }
  }
}

function findParentArr(id, arr) {
  for (const n of arr) {
    if (n.children.some(c => c.id === id)) return n.children;
    if (n.children.length) { const f = findParentArr(id, n.children); if (f) return f; }
  }
  return null;
}

function addRootFolder() {
  openModal('Neuer Root-Ordner', 'Name des Ordners', 'folder', (name, desc) => {
    nodes.push(createNode('folder', name, desc));
    render();
  });
}

function addRootFile() {
  openModal('Neue Root-Datei', 'Dateiname', 'file', (name, desc) => {
    nodes.push(createNode('file', name, desc));
    render();
  });
}

function addChild(parentId, type) {
  const label = type === 'folder' ? 'Unterordner' : 'Datei';
  openModal(`Neuer ${label}`, 'Name eingeben', type, (name, desc) => {
    const parent = findNode(parentId, nodes);
    if (parent) { parent.children.push(createNode(type, name, desc)); parent.open = true; }
    render();
  });
}

function deleteNode(id) {
  const parentArr = findParentArr(id, nodes) || nodes;
  const idx = parentArr.findIndex(n => n.id === id);
  if (idx !== -1) parentArr.splice(idx, 1);
  render();
}

function renameNode(id) {
  const node = findNode(id, nodes);
  if (!node) return;
  openModal('Umbenennen', 'Neuer Name', node.type, (name, desc) => {
    node.name = name;
    if (desc !== '') node.desc = desc;
    render();
  });
  setTimeout(() => { document.getElementById('modal-name').value = node.name; document.getElementById('modal-desc').value = node.desc; }, 50);
}

function toggleNode(id) {
  const node = findNode(id, nodes);
  if (node) { node.open = !node.open; render(); }
}

function clearAll() {
  if (nodes.length === 0) return;
  if (confirm('Alles löschen?')) { nodes = []; render(); }
}

// ── RENDER TREE ──────────────────────────────────────────────
function render() {
  const tree = document.getElementById('tree');
  if (nodes.length === 0) {
    tree.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <p>Noch keine Einträge – füge einen Ordner oder eine Datei hinzu</p>
    </div>`;
  } else {
    tree.innerHTML = renderNodes(nodes, 0);
  }
  updateOutput();
}

function renderNodes(arr, depth) {
  return arr.map(node => {
    const indent = depth * 20;
    const isFolder = node.type === 'folder';
    const icon = isFolder ? (node.open ? '📂' : '📁') : getFileIcon(node.name);
    const hasChildren = node.children.length > 0;

    const childrenHtml = isFolder && node.open && node.children.length
      ? `<div class="node-children">${renderNodes(node.children, depth + 1)}</div>` : '';

    return `<div class="node" data-id="${node.id}">
      <div class="node-row" onclick="handleRowClick(event, ${node.id}, ${isFolder})">
        <div class="node-indent" style="width:${indent + 8}px"></div>
        <div class="node-toggle ${isFolder ? (node.open ? 'open' : '') : 'leaf'}">▶</div>
        <span class="node-icon">${icon}</span>
        <span class="node-name ${node.type}">${escHtml(node.name)}${isFolder ? '/' : ''}</span>
        ${node.desc ? `<span class="node-desc">— ${escHtml(node.desc)}</span>` : ''}
        <div class="node-actions">
          ${isFolder ? `
          <button class="node-action-btn" title="Unterordner" onclick="event.stopPropagation();addChild(${node.id},'folder')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </button>
          <button class="node-action-btn" title="Datei hinzufügen" onclick="event.stopPropagation();addChild(${node.id},'file')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="13" x2="12" y2="17"/><line x1="10" y1="15" x2="14" y2="15"/></svg>
          </button>` : ''}
          <button class="node-action-btn" title="Umbenennen" onclick="event.stopPropagation();renameNode(${node.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="node-action-btn del" title="Löschen" onclick="event.stopPropagation();deleteNode(${node.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      ${childrenHtml}
    </div>`;
  }).join('');
}

function handleRowClick(e, id, isFolder) {
  if (isFolder) toggleNode(id);
}

// ── OUTPUT GENERATION ────────────────────────────────────────
function updateOutput() {
  const lines = [];
  let count = 0;

  function walk(arr, prefix) {
    arr.forEach((node, i) => {
      const isLast = i === arr.length - 1;
      const connector = isLast ? '└── ' : '├── ';
      const childPrefix = prefix + (isLast ? '    ' : '│   ');
      const label = node.type === 'folder' ? node.name + '/' : node.name;
      const desc = node.desc ? `        (${node.desc})` : '';
      lines.push(`${prefix}${connector}${label}${desc}`);
      count++;
      if (node.type === 'folder' && node.children.length) {
        walk(node.children, childPrefix);
      }
    });
  }

  if (nodes.length === 0) {
    document.getElementById('output').innerHTML = '';
    document.getElementById('stat').textContent = '0 Einträge';
    return;
  }

  // If there's a single root folder, show it as the root
  if (nodes.length === 1 && nodes[0].type === 'folder') {
    const root = nodes[0];
    const desc = root.desc ? `        (${root.desc})` : '';
    lines.push(`${root.name}/${desc}`);
    count++;
    walk(root.children, '');
  } else {
    walk(nodes, '');
  }

  const raw = lines.join('\n');

  // Colorize
  const colored = lines.map(line => {
    return line
      .replace(/(├── |└── |│   |    )/g, '<span class="connector">$1</span>')
      .replace(/([^\/\s─├└│(]+\/)(\s*(\(.*\))?)?$/, '<span class="folder-name">$1</span>$2')
      .replace(/([^\/\s─├└│(]+\.[a-zA-Z0-9]+)(\s*(\(.*\))?)?$/, '<span class="file-name">$1</span>$2')
      .replace(/(\(.*\))/, '<span class="comment">$1</span>');
  }).join('\n');

  document.getElementById('output').innerHTML = colored;
  document.getElementById('stat').textContent = `${count} Einträge`;
}

function getRawOutput() {
  const lines = [];

  function walk(arr, prefix) {
    arr.forEach((node, i) => {
      const isLast = i === arr.length - 1;
      const connector = isLast ? '└── ' : '├── ';
      const childPrefix = prefix + (isLast ? '    ' : '│   ');
      const label = node.type === 'folder' ? node.name + '/' : node.name;
      const desc = node.desc ? `        (${node.desc})` : '';
      lines.push(`${prefix}${connector}${label}${desc}`);
      if (node.type === 'folder' && node.children.length) {
        walk(node.children, childPrefix);
      }
    });
  }

  if (nodes.length === 0) return '';

  if (nodes.length === 1 && nodes[0].type === 'folder') {
    const root = nodes[0];
    const desc = root.desc ? `        (${root.desc})` : '';
    lines.push(`${root.name}/${desc}`);
    walk(root.children, '');
  } else {
    walk(nodes, '');
  }

  return lines.join('\n');
}

function copyOutput() {
  const text = getRawOutput();
  if (!text) return;
  navigator.clipboard.writeText(text);
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── IMPORT FILE ──────────────────────────────────────────────
function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    parseTreeText(e.target.result);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseTreeText(text) {
  const lines = text.split('\n').filter(l => l.trim());
  nodes = [];
  nodeId = 0;

  // Stack: [{node, depth}]
  const stack = [];

  for (const line of lines) {
    // Detect indent level by counting leading characters
    const raw = line;
    // Count how deep we are
    const stripped = raw.replace(/^[│├└\s─]+/, '');
    const leading = raw.length - stripped.length;
    const depth = Math.floor(leading / 4);

    // Extract name and desc
    let name = stripped.trim().replace(/\/$/, '');
    let desc = '';
    const descMatch = name.match(/\s+\((.+)\)$/);
    if (descMatch) {
      desc = descMatch[1];
      name = name.replace(/\s+\((.+)\)$/, '').trim();
    }

    const isFolder = stripped.includes('/') || false;
    const node = createNode(isFolder ? 'folder' : 'file', name, desc);

    while (stack.length > 0 && stack[stack.length - 1].depth >= depth) stack.pop();

    if (stack.length === 0) {
      nodes.push(node);
    } else {
      stack[stack.length - 1].node.children.push(node);
    }

    if (isFolder) stack.push({ node, depth });
  }

  render();
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { js: '📜', ts: '📘', jsx: '⚛️', tsx: '⚛️', html: '🌐', css: '🎨', json: '📋', md: '📝', txt: '📄', png: '🖼️', jpg: '🖼️', svg: '🎭', py: '🐍', sh: '⚙️', env: '🔒', gitignore: '🚫' };
  return icons[ext] || '📄';
}

// Init
render();
