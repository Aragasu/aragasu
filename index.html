<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>aragasu.xyz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <link rel="icon" href="images/avatar.svg">
</head>
<body>

<main class="container">
  <div class="content-wrapper">

    <div class="avatar-wrapper fade-in">
      <div class="avatar">
        <img src="images/avatar.svg" alt="Aragasu">
      </div>
    </div>

    <h1 id="scramble-text" class="fade-in">aragasu</h1>
    <p class="pronouns fade-in">he/him</p>

    <div class="social-icons fade-in" id="social-icons"></div>
    <div class="info-list fade-in" id="info-list"></div>
    <div class="link-list fade-in" id="link-list"></div>

  </div>
</main>

<script>
/* === Scramble Name === */
const titleEl = document.getElementById('scramble-text');
const chars = 'xyz•●○♤♧◇$°•☆'; 
const text = 'aragasu';
let frame = 0;
const totalFrames = 30;

function scramble() {
  let output = '';
  for (let i = 0; i < text.length; i++) {
    output += Math.random() < frame / totalFrames
      ? text[i]
      : chars[Math.floor(Math.random() * chars.length)];
  }
  titleEl.textContent = output;
  frame++;
  if (frame <= totalFrames) {
    requestAnimationFrame(scramble);
  }
}
scramble();

/* === Staggered Fade-in === */
window.addEventListener('load', () => {
  document.querySelectorAll('.fade-in').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), i * 150);
  });
});

/* === Hilfsfunktion für "null" Check === */
const clean = (str) => (str && str.trim().toLowerCase() === "null") ? "" : str.trim();

/* === Data Fetching === */
fetch('socials.txt').then(res => res.text()).then(text => {
    const container = document.getElementById('social-icons');
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    for (let i = 0; i < lines.length; i += 3) {
      const a = document.createElement('a');
      a.href = lines[i + 1];
      a.target = '_blank';
      a.innerHTML = `<i class="${lines[i + 2]}"></i>`;
      container.appendChild(a);
    }
});

fetch('info.txt').then(res => res.text()).then(text => {
    const container = document.getElementById('info-list');
    const lines = text.split('\n');
    for (let i = 0; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      
      const title = clean(lines[i]);
      const content = clean(lines[i + 1] || '');
      i++; 

      if (!title) continue;

      const div = document.createElement('div');
      div.className = 'link-card';
      div.innerHTML = `<strong>${title}</strong>${(content && content !== '{0}') ? '<br><span>' + content + '</span>' : ''}`;
      container.appendChild(div);
    }
});

fetch('cards.txt').then(res => res.text()).then(text => {
    const container = document.getElementById('link-list');
    const lines = text.split('\n').map(l => l.trim());
    for (let i = 0; i < lines.length; i++) {
      if (!lines[i]) continue;

      const title = clean(lines[i]); i++;
      const url = clean(lines[i]);   i++;
      let desc = clean(lines[i] || ''); i++;

      if (!title || !url) continue;

      const a = document.createElement('a');
      a.className = 'link-card';
      a.href = url;
      a.target = '_blank';
      a.innerHTML = `<strong>${title}</strong>${(desc && desc !== '{0}') ? '<br><span>' + desc + '</span>' : ''}`;
      container.appendChild(a);
    }
});
</script>

<div id="ig-banner-wrap">
    <div id="my-instant-gaming-banner"></div>
</div>
<script>
    window.igBannerConfig = { lang: 'en', igr: 'aragasu', banners: ['my-instant-gaming-banner'] };
</script>
<script src="https://www.instant-gaming.com/api/banner/partner/loader.js" defer></script>
</body>
</html>
